[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.ruff.lint.per-file-ignores]
"test/*" = ["E501"]

[tool.pytest.ini_options]
testpaths = ["test"]
pythonpath = ["."]

[tool.coverage.report]
# Lines that pytest never executes by design — exclude from coverage so
# the report focuses on real uncovered logic rather than test boilerplate.
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
]
